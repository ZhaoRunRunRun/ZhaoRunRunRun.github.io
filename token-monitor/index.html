<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Token Monitor</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="title-block">
        <div class="title-row">
          <h1>Token Monitor</h1>
          <span class="inline-meta">仓库：
            <a id="repoLink" class="repo-icon-link" href="https://github.com/ZhaoRunRunRun/ZhaoRunRunRun.github.io" target="_blank" rel="noopener" aria-label="GitHub 仓库">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 2C6.48 2 2 6.58 2 12.23c0 4.51 2.87 8.33 6.84 9.68.5.1.66-.22.66-.49 0-.24-.01-1.05-.01-1.9-2.78.62-3.37-1.21-3.37-1.21-.45-1.19-1.11-1.51-1.11-1.51-.91-.64.07-.63.07-.63 1 .07 1.53 1.05 1.53 1.05.9 1.57 2.36 1.12 2.93.86.09-.67.35-1.12.64-1.38-2.22-.26-4.55-1.14-4.55-5.08 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.72 0 0 .84-.27 2.75 1.05A9.32 9.32 0 0 1 12 6.84c.85 0 1.7.12 2.5.35 1.9-1.32 2.74-1.05 2.74-1.05.55 1.42.2 2.46.1 2.72.64.72 1.03 1.63 1.03 2.75 0 3.95-2.33 4.82-4.56 5.08.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.8 0 .27.17.59.67.49A10.27 10.27 0 0 0 22 12.23C22 6.58 17.52 2 12 2z"></path>
              </svg>
            </a>
          </span>
          <span class="inline-meta">刷新：<strong id="refreshAt">-</strong></span>
          <span class="inline-meta">当前：<strong id="nowClock">-</strong></span>
        </div>
        <p>历史 Token 消耗看板（输入 / 输出）</p>
      </div>
      <div class="theme-controls">
        <label class="pill-switch">
          <input id="autoTheme" type="checkbox" checked />
          <span>自动切换</span>
        </label>
        <label class="pill-switch">
          <input id="darkTheme" type="checkbox" />
          <span>暗色模式</span>
        </label>
      </div>
    </header>

    <section class="filters card">
      <label>
        开始日期
        <div class="date-dd" id="startDateWrap">
          <button id="startDateBtn" type="button" class="date-dd-btn">全部</button>
          <div id="startDateMenu" class="date-dd-menu" hidden></div>
          <input id="startDate" type="hidden" value="" />
        </div>
      </label>
      <label>
        结束日期
        <div class="date-dd" id="endDateWrap">
          <button id="endDateBtn" type="button" class="date-dd-btn">全部</button>
          <div id="endDateMenu" class="date-dd-menu" hidden></div>
          <input id="endDate" type="hidden" value="" />
        </div>
      </label>
      <button id="applyBtn" type="button">应用筛选</button>
      <button id="resetBtn" type="button" class="ghost">重置</button>
      <span id="statusText"></span>
    </section>

    <section class="card heatmaps">
      <h2>历史热力格</h2>
      <div class="split">
        <article>
          <h3>输入 Token</h3>
          <div id="inputHeatmap" class="heatmap"></div>
        </article>
        <article>
          <h3>输出 Token</h3>
          <div id="outputHeatmap" class="heatmap"></div>
        </article>
      </div>
      <p class="legend">颜色越深，表示当日消耗越高。</p>
    </section>

    <section class="card line-panel">
      <div class="line-header">
        <h2>实时消耗趋势</h2>
        <div class="line-tools">
          <div class="range-group" id="quickRangeGroup" role="group" aria-label="快捷时间范围">
            <button type="button" class="range-btn" data-range="custom">按全局日期</button>
            <button type="button" class="range-btn" data-range="1h">1h</button>
            <button type="button" class="range-btn" data-range="24h">24h</button>
            <button type="button" class="range-btn" data-range="7d">7day</button>
            <button type="button" class="range-btn" data-range="30d">30day</button>
            <button type="button" class="range-btn" data-range="all">全部</button>
          </div>
          <div class="range-group" id="unitGroup" role="group" aria-label="单位选择">
            <button type="button" class="range-btn" data-unit="token">Token</button>
            <button type="button" class="range-btn" data-unit="k">K Token</button>
          </div>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="lineChart" width="1400" height="420" aria-label="Token trend chart"></canvas>
        <div id="chartTooltip" class="chart-tooltip" hidden></div>
      </div>
      <p id="lineMeta" class="legend"></p>
      <p class="legend"><span class="dot red"></span>输入（红）<span class="dot blue"></span>输出（蓝）</p>
    </section>

    <section class="card week-panel">
      <div class="week-header">
        <h2>近一周数据消耗</h2>
        <div class="week-head-right">
          <div class="range-group" id="weekUnitGroup" role="group" aria-label="近一周单位选择">
            <button type="button" class="range-btn" data-unit="token">Token</button>
            <button type="button" class="range-btn" data-unit="k">K Token</button>
          </div>
          <span id="weekRangeText" class="legend"></span>
        </div>
      </div>
      <div class="week-stats">
        <article class="week-stat in">
          <span>输入总量</span>
          <strong id="weekInputTotal">0</strong>
        </article>
        <article class="week-stat out">
          <span>输出总量</span>
          <strong id="weekOutputTotal">0</strong>
        </article>
        <article class="week-stat sum">
          <span>近7日总量</span>
          <strong id="weekSumTotal">0</strong>
        </article>
      </div>
      <div id="weekRows" class="week-rows"></div>

      <div class="week-pager-panel">
        <h3>历史日统计</h3>
        <div id="weekPageRows" class="week-page-rows"></div>
        <div class="pager-actions">
          <button id="prevPageBtn" type="button" class="ghost">上一页</button>
          <span id="pageText" class="legend">第 1 页</span>
          <button id="nextPageBtn" type="button" class="ghost">下一页</button>
        </div>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
